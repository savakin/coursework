    <!-- КОНТАКТЫ -->
    <section class="contacts-page">

        <h1>Контакты</h1>

        <div class="contacts-container">

            <!-- информация -->
            <div class="contacts-info">

                <h2>Свяжитесь с нами</h2>

                <p><strong>Телефон:</strong> +7 900 000 0000</p>
                <p><strong>Email:</strong> info@mail.com</p>
                <p><strong>Адрес:</strong> Ярославль, ул.Победы, 22</p>


            </div>

            <!-- форма -->
            <div class="contacts-form" id="form">

                <h2>Написать нам</h2>

                <form action="../server.php" method="POST">

                    <input type="text" name="name" placeholder="Ваше имя" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <textarea name="message" placeholder="Сообщение" required></textarea>

                    <button type="submit">Отправить</button>

                </form>

            </div>

        </div>

    </section>

    <!-- ЯНДЕКС КАРТА -->

    <footer class="footer">

    <!-- Яндекс API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>

    <script>
        // ИНИЦИАЛИЗАЦИЯ КАРТЫ
        ymaps.ready(init);

        function init() {

            var map = new ymaps.Map("map", {
                center: [57.6356115555002, 39.872878232792296],
                zoom: 15
            });

            var placemark = new ymaps.Placemark(
                [57.6356115555002, 39.872878232792296],
                {
                    hintContent: "Наша компания",
                    balloonContent: "Мы здесь!"
                }
            );

            map.geoObjects.add(placemark);

        }


        const burger = document.getElementById("burger");
        const nav = document.getElementById("nav");

        if (burger && nav) {
            burger.addEventListener("click", () => {
                nav.classList.toggle("active");
            });
        }
    </script>
    <script src="../JS/script.js"></script>
